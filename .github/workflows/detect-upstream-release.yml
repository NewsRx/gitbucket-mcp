name: Detect Upstream GitBucket Release

on:
  schedule:
    # Run hourly on the hour
    - cron: '0 * * * *'
  workflow_dispatch:
    # Allow manual triggering for testing

jobs:
  detect-release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1
      
      - name: Get current tracked release
        id: current-release
        run: |
          if [ -f workflow-state/last_release.txt ]; then
            CURRENT=$(cat workflow-state/last_release.txt)
            echo "current_release=$CURRENT" >> $GITHUB_OUTPUT
          else
            echo "current_release=none" >> $GITHUB_OUTPUT
          fi
      
      - name: Fetch GitBucket releases
        id: fetch-releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fetch releases from GitBucket upstream
          RELEASES=$(curl -s \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/gitbucket/gitbucket/releases?per_page=100")
          
          # Filter to stable releases only (no prereleases)
          STABLE_RELEASES=$(echo "$RELEASES" | jq -r '[.[] | select(.prerelease == false)] | sort_by(.published_at) | reverse | .[0]')
          
          if [ -z "$STABLE_RELEASES" ] || [ "$STABLE_RELEASES" = "null" ]; then
            echo "No stable releases found"
            echo "has_new_release=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          LATEST_VERSION=$(echo "$STABLE_RELEASES" | jq -r '.tag_name')
          LATEST_PUBLISHED=$(echo "$STABLE_RELEASES" | jq -r '.published_at')
          LATEST_HTML_URL=$(echo "$STABLE_RELEASES" | jq -r '.html_url')
          
          echo "latest_version=$LATEST_VERSION" >> $GITHUB_OUTPUT
          echo "latest_published=$LATEST_PUBLISHED" >> $GITHUB_OUTPUT
          echo "latest_html_url=$LATEST_HTML_URL" >> $GITHUB_OUTPUT
          
          # Check if this is newer than tracked
          CURRENT="${{ steps.current-release.outputs.current_release }}"
          
          if [ "$CURRENT" = "none" ] || [ "$LATEST_VERSION" != "$CURRENT" ]; then
            echo "has_new_release=true" >> $GITHUB_OUTPUT
          else
            echo "has_new_release=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Get previous release info
        if: steps.fetch-releases.outputs.has_new_release == 'true'
        id: prev-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT="${{ steps.current-release.outputs.current_release }}"
          LATEST="${{ steps.fetch-releases.outputs.latest_version }}"
          
          if [ "$CURRENT" = "none" ]; then
            # First run - get all releases to find the one before latest
            RELEASES=$(curl -s \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              "https://api.github.com/repos/gitbucket/gitbucket/releases?per_page=100")
            
            PREV_VERSION=$(echo "$RELEASES" | jq -r '[.[] | select(.prerelease == false)] | sort_by(.published_at) | reverse | .[1].tag_name // "none"')
          else
            PREV_VERSION="$CURRENT"
          fi
          
          echo "prev_version=$PREV_VERSION" >> $GITHUB_OUTPUT
      
      - name: Get commit SHA for release
        if: steps.fetch-releases.outputs.has_new_release == 'true'
        id: commit-sha
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.fetch-releases.outputs.latest_version }}"
          
          # Get commit SHA for the tag
          TAG_INFO=$(curl -s \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/gitbucket/gitbucket/git/ref/tags/$VERSION")
          
          COMMIT_SHA=$(echo "$TAG_INFO" | jq -r '.object.sha')
          echo "commit_sha=$COMMIT_SHA" >> $GITHUB_OUTPUT
      
      - name: Check for existing open issue
        if: steps.fetch-releases.outputs.has_new_release == 'true'
        id: check-issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.fetch-releases.outputs.latest_version }}"
          
          # Check for existing open issue for this version
          ISSUES=$(curl -s \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/issues?state=open&labels=upstream,api-sync")
          
          EXISTING=$(echo "$ISSUES" | jq -r --arg v "$VERSION" '.[] | select(.title | contains($v)) | .number')
          
          if [ -n "$EXISTING" ]; then
            echo "Issue #$EXISTING already exists for $VERSION"
            echo "issue_exists=true" >> $GITHUB_OUTPUT
          else
            echo "issue_exists=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Create release issue
        if: |
          steps.fetch-releases.outputs.has_new_release == 'true' &&
          steps.check-issue.outputs.issue_exists != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.fetch-releases.outputs.latest_version }}"
          COMMIT_SHA="${{ steps.commit-sha.outputs.commit_sha }}"
          PUBLISHED="${{ steps.fetch-releases.outputs.latest_published }}"
          HTML_URL="${{ steps.fetch-releases.outputs.latest_html_url }}"
          PREV_VERSION="${{ steps.prev-release.outputs.prev_version }}"
          REPO_OWNER="${{ github.repository_owner }}"
          
          # Format date
          DATE=$(date -u +"%Y-%m-%d")
          
          # Generate compare URL
          if [ "$PREV_VERSION" != "none" ]; then
            COMPARE_URL="https://github.com/gitbucket/gitbucket/compare/$PREV_VERSION...$VERSION"
          else
            COMPARE_URL="https://github.com/gitbucket/gitbucket/releases/tag/$VERSION"
          fi
          
          # Create issue using template
          ISSUE_BODY=$(cat << 'EOFMARKER'
          ---
          title: "[SPEC] Upstream GitBucket Release {VERSION} - OpenAPI Spec Update"
          labels: ["api-sync","upstream","needs-approval"]
          assignees: ["{REPO_OWNER}"]
          ---
          
          # Spec: Upstream GitBucket Release {VERSION} - OpenAPI Spec Update
          
          STATUS: 1.1
          CREATED: {DATE}
          
          ---
          
          ## Objective
          
          Update the OpenAPI specification to reflect API changes in GitBucket release {VERSION}.
          
          ---
          
          ## Upstream Release Details
          
          | Field | Value |
          |-------|-------|
          | **Version** | {VERSION} |
          | **Commit SHA** | {COMMIT_SHA} |
          | **Release Date** | {PUBLISHED_DATE} |
          | **Release Notes** | [{VERSION} Release Notes]({RELEASE_NOTES_URL}) |
          | **Compare View** | [Changes from {PREV_VERSION}]({COMPARE_URL}) |
          
          ## Source Repository for Probing
          
          **Repository URL:** https://github.com/gitbucket/gitbucket
          **Git Clone URL:** https://github.com/gitbucket/gitbucket.git
          **Default Branch:** master
          **Release Tag:** {VERSION}
          **Build System:** Scala/sbt
          
          See the [Issue Template](.github/ISSUE_TEMPLATE/upstream-release.md) for analysis workflow.
          
          EOFMARKER
          )
          
          # Replace placeholders
          ISSUE_BODY="${ISSUE_BODY//\{VERSION\}/$VERSION}"
          ISSUE_BODY="${ISSUE_BODY//\{COMMIT_SHA\}/$COMMIT_SHA}"
          ISSUE_BODY="${ISSUE_BODY//\{PUBLISHED_DATE\}/$PUBLISHED}"
          ISSUE_BODY="${ISSUE_BODY//\{RELEASE_NOTES_URL\}/$HTML_URL}"
          ISSUE_BODY="${ISSUE_BODY//\{PREV_VERSION\}/$PREV_VERSION}"
          ISSUE_BODY="${ISSUE_BODY//\{COMPARE_URL\}/$COMPARE_URL}"
          ISSUE_BODY="${ISSUE_BODY//\{DATE\}/$DATE}"
          ISSUE_BODY="${ISSUE_BODY//\{REPO_OWNER\}/$REPO_OWNER}"
          
          # Create the issue
          curl -s -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/issues" \
            -d "$(jq -n \
              --arg title "[SPEC] Upstream GitBucket Release $VERSION - OpenAPI Spec Update" \
              --arg body "$ISSUE_BODY" \
              --argjson labels '["api-sync","upstream","needs-approval"]' \
              --argjson assignees "[\"$REPO_OWNER\"]" \
              '{title: $title, body: $body, labels: $labels, assignees: $assignees}')"
          
          echo "Created issue for release $VERSION"
      
      - name: Update tracked release
        if: steps.fetch-releases.outputs.has_new_release == 'true'
        run: |
          VERSION="${{ steps.fetch-releases.outputs.latest_version }}"
          echo "$VERSION" > workflow-state/last_release.txt
          
          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Commit state file
          git add workflow-state/last_release.txt
          git commit -m "chore: update tracked release to $VERSION" || echo "No changes to commit"
          git push